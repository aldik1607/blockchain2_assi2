[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
gas_reports = ["AMM", "LPToken", "Token", "LendingPool"]


[profile.default.fuzz]
runs = 1000

[profile.default.invariant]
runs = 500
depth = 100

coverage_pattern_exclusion = ["script/*", "test/*"]

[rpc_endpoints]
mainnet = "${MAINNET_RPC_URL}"

